app:
  api:
    version: v1
  version: 1.0.0
  security:
    jwt:
      secret-key: ${SECRET_KEY:fallback}
      expiration: 86400000
      refresh-token:
        expiration: 604800000
    integration:
      url: ${SECURITY_URL:http://localhost:8085}
      secret: ${INTERNAL_SECRET:microservice-internal-secret}
    homomorphic:
      a-sets: ${HOMOMORPHIC_A_SETS}

  ai:
    primary: ${AI_PRIMARY_PROVIDER:hf}
    cloud:
      model: ${AI_CLOUD_MODEL:gpt-4o-mini}
    hf:
      url: ${HF_URL:https://router.huggingface.co/zai-org/api/paas/v4/layout_parsing}
      token: ${HF_TOKEN:}
    ollama:
      model: ${OLLAMA_MODEL:ocr-masivo}
    groq:
      url: ${GROQ_URL:https://api.groq.com/openai/v1}
      token: ${GROQ_TOKEN:}
      model: ${GROQ_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}

logging:
  level:
    com.zaxxer.hikari: ERROR
    org.hibernate: ERROR
    org.hibernate.SQL: DEBUG
    org.springframework: ERROR
    root: ERROR
    web: INFO

management:
  endpoints:
    web:
      exposure:
        include: '*'
  server:
    port: ${PLANILLA_PORT_ACTUATOR:8081}

server:
  port: ${PORT:8080}

spring:
  application:
    name: MicroservicioPlanilla

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_HOST}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      initialization-fail-timeout: 60000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${JPA_DDL}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  main:
    allow-circular-references: true

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    store-type: redis

  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:dummy-key}