app:
  api:
    version: v1
  version: 1.0.0
  security:
    jwt:
      secrect-key: ${SECRET_KEY:fallback}
      expiration: 86400000
      refresh-token:
        expiration: 604800000

logging:
  level:
    com.zaxxer.hikari: ERROR
    org.hibernate: ERROR
    org.hibernate.SQL: DEBUG
    org.springframework: ERROR
    root: ERROR
    web: INFO

management:
  endpoints:
    web:
      exposure:
        include: '*'
  server:
    port: ${PLANILLA_PORT_ACTUATOR:8081}

server:
  port: ${PORT:8080}

spring:
  application:
    name: MicroservicioPlanilla
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      initialization-fail-timeout: 60000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
    password: ${DB_PASS}
    url: ${DB_HOST}
    username: ${DB_USER}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${JPA_DDL}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  main:
    allow-circular-references: true
  sql:
    init:
      mode: always
  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}