version: '3.8'

services:
  postgres:
    image: ${DB_IMAGE}
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mynetwork

  planilla-service:
    build: .
    container_name: planilla-service
    restart: always
    ports:
      - "${PLANILLA_PORT}:8080"
    depends_on:
      - postgres
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_HOST=jdbc:postgresql://postgres:5432/${DB_NAME}
      - JPA_DDL=${JPA_DDL}
      - PORT=8080
      - OLLAMA_URL=${OLLAMA_URL}
      - SECRET_KEY=${SECRET_KEY}
    networks:
      - mynetwork

volumes:
  postgres_data:
    name: ${VOLUME_NAME:-postgres_data}

networks:
  mynetwork:
    driver: bridge