services:
  app:
    image: ${ASISTENCIA_IMAGE}
    container_name: asistencia-app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${ASISTENCIA_PORT}:8081"
      - "${ASISTENCIA_ACTUATOR_PORT}:8082"
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - JPA_DDL=${JPA_DDL}
      - DB_HOST=jdbc:postgresql://db:5432/${DB_NAME}
      - PORT=8081
    networks:
      - asistencia-network

  db:
    image: ${DB_IMAGE}
    container_name: asistencia-postgres
    restart: unless-stopped
    ports:
      - "${DB_HOST_PORT}:5432"
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - ./data:/var/lib/postgresql/data
    networks:
      - asistencia-network

networks:
  asistencia-network:
    driver: bridge