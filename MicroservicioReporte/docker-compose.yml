
services:
  postgres:
    image: ${DB_IMAGE}
    container_name: postgres-reporte
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mynetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  reporte-service:
    build: .
    container_name: reporte-service
    restart: unless-stopped
    ports:
      - "${REPORTE_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=jdbc:postgresql://postgres-reporte:5432/${DB_NAME}
      - JPA_DDL=${JPA_DDL}
      - PORT=8080
    networks:
      - mynetwork

volumes:
  postgres_data:

networks:
  mynetwork:
    driver: bridge